# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

remote_write:
  - url: http://mimir:9009/api/v1/push
    headers:
      "X-Scope-OrgID": "devops"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "central-prometheus"
    static_configs:
      - targets:
        - "localhost:9090"
  # - job_name: 'federate'
  #   scrape_interval: 15s
  #   honor_labels: true
  #   metrics_path: '/federate'
  #   # match all timeseries
  #   params:
  #     'match[]':
  #       - '{__name__=~".+"}'
  #   static_configs:
  #     # targeting other prometheus servers
  #     - targets:
  #       - '192.168.200.183:34366'
  - job_name: "grafana"
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http
    follow_redirects: true
    static_configs:
    - targets:
      - grafana:3000
  - job_name: "poc_backend"
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http
    follow_redirects: true
    static_configs:
    - targets:
      - backend:8080
  # - job_name: "poc_otelcollector"
  #   scrape_interval: 15s
  #   scrape_timeout: 10s
  #   metrics_path: /metrics
  #   scheme: http
  #   follow_redirects: true
  #   static_configs:
  #   - targets:
  #     - otelcollector:8888
  - job_name: "poc_frontend"
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http
    follow_redirects: true
    static_configs:
    - targets:
      - otelcollector:9464