map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    root /var/www/html;
    index index.html;
    server_name _;
    underscores_in_headers on;

    # for uploading files
    client_max_body_size 100m;
    client_body_buffer_size 512k;

    # Timeout settings for client connections
    client_body_timeout 60;
    client_header_timeout 10s;
    keepalive_timeout 60s;
    send_timeout 10s;

    # for vue.js routing
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # handle API requests
    location /backend/ {
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass http://backend:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;

        # Set to forward all headers
        proxy_pass_request_headers on;

        # ensure nginx manages connections as client requests, espeially websockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Ensure upgraded connections are not cached
        proxy_cache_bypass $http_upgrade;

        # Buffer settings for backend connections
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
        proxy_busy_buffers_size 32k;
        proxy_temp_file_write_size 256k;
        proxy_max_temp_file_size 100m;

        # Timeout settings for backend connections
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # handle API requests
    location /otel/ {
        rewrite ^/otel/(.*)$ /$1 break;
        proxy_pass http://otelcollector:4318;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;

        # Set to forward all headers
        proxy_pass_request_headers on;

        # ensure nginx manages connections as client requests, espeially websockets
        proxy_set_header Connection $http_connection;
        proxy_set_header Upgrade $http_upgrade;

        # Ensure upgraded connections are not cached
        proxy_cache_bypass $http_upgrade;

        # Buffer settings for backend connections
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
        proxy_busy_buffers_size 32k;
        proxy_temp_file_write_size 256k;
        proxy_max_temp_file_size 100m;

        # Timeout settings for backend connections
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}